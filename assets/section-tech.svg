<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="140" viewBox="0 0 1200 140"
     role="img" aria-labelledby="sec-tech-title">
  <title id="sec-tech-title">Tech Stack section header</title>

  <defs>
    <linearGradient id="tech-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C41E3A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="140" rx="14" fill="#0a0a0a"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="140" rx="2" fill="url(#tech-grad)"/>

  <!-- Icon: stack layers -->
  <g transform="translate(48 50)">
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#1a1010" stroke="#3a1515" stroke-width="1"/>
    <g transform="translate(10 12)">
      <rect x="0" y="0" width="24" height="6" rx="2" fill="#FFD700" opacity="0.9"/>
      <rect x="3" y="9" width="24" height="6" rx="2" fill="#FF6B6B" opacity="0.7"/>
      <rect x="6" y="18" width="24" height="6" rx="2" fill="#C41E3A" opacity="0.5"/>
    </g>
  </g>

  <!-- Section number -->
  <text x="112" y="64" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="12" fill="#3a1515" letter-spacing="1">03</text>

  <!-- Section title -->
  <text x="112" y="96" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
        font-size="32" font-weight="700" fill="#FFF5E1" letter-spacing="-0.5">
    Tech Stack
  </text>

  <!-- Subtle descriptor -->
  <text x="330" y="96" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
        font-size="14" fill="#8B4513">
    Python, TypeScript, C++, FastAPI, Next.js, Docker, GCP
  </text>

  <!-- Right decorative dots -->
  <g transform="translate(1120 50)" opacity="0.25">
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
    <circle cx="16" cy="0" r="3" fill="#C41E3A"/>
    <circle cx="32" cy="0" r="3" fill="#FF6B6B"/>
  </g>
</svg>
