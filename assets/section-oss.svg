<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="140" viewBox="0 0 1200 140"
     role="img" aria-labelledby="sec-oss-title">
  <title id="sec-oss-title">Open Source section header</title>

  <defs>
    <linearGradient id="oss-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="140" rx="14" fill="#0a0a0a"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="140" rx="2" fill="url(#oss-grad)"/>

  <!-- Icon: git merge -->
  <g transform="translate(48 50)">
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#1a1010" stroke="#3a1515" stroke-width="1"/>
    <g transform="translate(12 10)">
      <circle cx="10" cy="4" r="3" fill="#FF6B6B"/>
      <circle cx="10" cy="24" r="3" fill="#FF6B6B"/>
      <circle cx="10" cy="14" r="3" fill="#FFD700"/>
      <line x1="10" y1="7" x2="10" y2="21" stroke="#FF6B6B" stroke-width="1.5"/>
      <path d="M10 7 Q10 14 10 14" stroke="#FFD700" stroke-width="1.5" fill="none"/>
      <path d="M10 21 Q10 14 10 14" stroke="#FFD700" stroke-width="1.5" fill="none"/>
    </g>
  </g>

  <!-- Section number -->
  <text x="112" y="64" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="12" fill="#3a1515" letter-spacing="1">02</text>

  <!-- Section title -->
  <text x="112" y="96" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
        font-size="32" font-weight="700" fill="#FFF5E1" letter-spacing="-0.5">
    Open Source
  </text>

  <!-- Subtle descriptor -->
  <text x="360" y="96" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
        font-size="14" fill="#8B4513">
    50+ merged PRs across Kubeflow, Ray, T3MP3ST, and more
  </text>

  <!-- Right decorative dots -->
  <g transform="translate(1120 50)" opacity="0.25">
    <circle cx="0" cy="0" r="3" fill="#FF6B6B"/>
    <circle cx="16" cy="0" r="3" fill="#C41E3A"/>
    <circle cx="32" cy="0" r="3" fill="#FFD700"/>
  </g>
</svg>
